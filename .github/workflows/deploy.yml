name: Deploy Vite to GitHub Pages
on:
  push:
    branches: [ main ]
# 赋予pages写入权限，解决git 128报错
permissions:
  contents: write
  pages: write
jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24 # 匹配当前强制版本，消除弃用警告
      - name: Install dependencies
        run: npm ci
      - name: Build project
        run: npm run build
      - name: Deploy to Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          # 解决中文仓库路径编码问题
          cname: ''
