name: Deploy Vite to GitHub Pages
on:
  push:
    branches: [ main ]
# 授予写入权限
permissions:
  contents: write
  pages: write
  id-token: write
jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
      - name: 配置 Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
      - name: 安装依赖（锁定版本，比install稳定）
        run: npm ci
      - name: 执行打包
        run: npm run build
      - name: 部署静态文件
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
